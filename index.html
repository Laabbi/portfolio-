<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body><div class="head">
    <h1>Welcome to My Portfolio</h1>
    <p>This is a brief introduction to my work and projects.</p>
    </div>
<div class="audio-container">
    <h2>Listen to My Tracks</h2>
    
    <audio id="mySong">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="audio-controls">
        <button id="playBtn" class="control-btn">Play</button>
        <button id="muteBtn" class="control-btn">Mute</button>
    </div>
</div>

<script>
    const song = document.getElementById("mySong");
    const playBtn = document.getElementById("playBtn");
    const muteBtn = document.getElementById("muteBtn");

    // Play / Pause toggle
    playBtn.addEventListener("click", function() {
        if (song.paused) {
            song.play();
            playBtn.textContent = "Pause";
        } else {
            song.pause();
            playBtn.textContent = "Play";
        }
    });

    // Mute / Unmute toggle
    muteBtn.addEventListener("click", function() {
        if (song.muted) {
            song.muted = false;
            muteBtn.textContent = "Mute";
            muteBtn.classList.remove("muted-active");
        } else {
            song.muted = true;
            muteBtn.textContent = "Unmute";
            muteBtn.classList.add("muted-active");
        }
    });
</script>
</div>
</body>
</html>
